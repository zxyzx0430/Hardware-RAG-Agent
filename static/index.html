<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hardware RAG Agent</title>

  <!-- HTMX for light interactions -->
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF8+Z1KKZ2bRtvXJNiD2mI8V6j3O2kI6c1s5V5LGM4Z1j6wXjI" crossorigin="anonymous" defer></script>

  <!-- highlight.js for syntax highlighting -->
  <link rel="stylesheet" href="https://unpkg.com/@highlightjs/cdn-assets@11.11.1/styles/github-dark.min.css">
  <script src="https://unpkg.com/@highlightjs/cdn-assets@11.11.1/highlight.min.js" defer></script>

  <!-- app styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

  <!-- header -->
  <header class="app-header">
    <h1>
      <span class="logo">H</span>
      Hardware RAG Agent
    </h1>
    <div class="header-actions">
      <button class="btn-icon" id="btn-settings" title="设置" aria-label="打开设置">⚙️</button>
    </div>
  </header>

  <!-- chat container -->
  <div id="chat-container" class="chat-container"></div>

  <!-- input area -->
  <div class="input-area">
    <form id="chat-form">
      <div class="input-wrapper">
        <textarea id="message-input"
                  rows="1"
                  placeholder="输入硬件问题…（Enter 发送，Shift+Enter 换行）"
                  aria-label="输入消息"></textarea>
        <button type="button" id="btn-send" class="btn-send" aria-label="发送">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </form>
  </div>

  <!-- settings overlay -->
  <div class="settings-overlay" id="settings-overlay"></div>

  <!-- settings panel -->
  <aside class="settings-panel" id="settings-panel" role="dialog" aria-label="设置面板">
    <div class="settings-header">
      <h2>⚙️ 设置</h2>
      <button class="btn-close" id="btn-close-settings" aria-label="关闭设置">✕</button>
    </div>

    <div class="settings-body">
      <!-- API Key -->
      <div class="settings-group">
        <label for="api-key">API Key</label>
        <input type="password" id="api-key" placeholder="sk-..." autocomplete="off" spellcheck="false">
        <span class="hint">你的 API Key，仅保存在本地浏览器</span>
      </div>

      <!-- Base URL -->
      <div class="settings-group">
        <label for="base-url">Base URL</label>
        <input type="url" id="base-url" placeholder="https://api.openai.com/v1" autocomplete="off" spellcheck="false">
        <span class="hint">兼容 OpenAI 的 API 地址</span>
      </div>

      <!-- Fetch models -->
      <div class="settings-group">
        <button class="btn-secondary" id="fetch-models" type="button">
          🔄 拉取模型列表
        </button>
        <div class="model-fetch-status" id="model-fetch-status"></div>
      </div>

      <!-- Model select -->
      <div class="settings-group">
        <label for="model-select">模型</label>
        <select id="model-select">
          <option value="">— 请先拉取模型列表 —</option>
        </select>
        <span class="hint">选择你要使用的模型</span>
      </div>
    </div>

    <div class="settings-footer">
      <button class="btn-primary" id="save-settings" type="button">保存设置</button>
    </div>
  </aside>

  <!-- toast notification -->
  <div id="toast" class="toast"></div>

</div>

<!-- app script -->
<script src="js/app.js" defer></script>

</body>
</html>
